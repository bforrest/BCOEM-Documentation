name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build main site
      - name: Install main site dependencies
        run: npm ci

      - name: Build main site
        run: npm run build
        env:
          NODE_ENV: production

      # Build docs (Starlight)
      - name: Install docs dependencies
        run: npm ci
        working-directory: .

      - name: Build docs
        run: npm run build
        working-directory: .

      # Merge: copy docs/dist into dist/docs
      - name: Merge docs into main dist
        run: cp -r docs/dist dist/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
